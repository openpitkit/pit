name: Docs

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  JUSTFILE: ${{ github.workspace }}/pipeline.just

concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Python API docs
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.CI_PYTHON }}
          cache: pip
          cache-dependency-path: |
            bindings/python/docs/requirements.txt
            bindings/python/pyproject.toml

      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "PYTHON_PATH=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "PYO3_PYTHON=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install documentation dependencies
        working-directory: bindings/python
        run: |
          "$PYTHON_PATH" -m pip install --upgrade pip
          "$PYTHON_PATH" -m pip install -r docs/requirements.txt

      - name: Install maturin and Python build dependencies
        run: |
          "$PYTHON_PATH" -m pip install -r requirements.txt

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Build documentation
        run: just --justfile "$JUSTFILE" build-python-docs

  build-js:
    name: Build JS API docs
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.CI_NODE }}
          cache: npm
          cache-dependency-path: bindings/js/package-lock.json

      - name: Resolve wasm-bindgen-cli version
        id: wasm-bindgen
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(
            awk '/^wasm-bindgen[[:space:]]*=/ {
                   match($0, /[0-9]+\.[0-9]+\.[0-9]+/); print substr($0, RSTART, RLENGTH); exit
                 }' bindings/js/Cargo.toml
          )"
          if [[ -z "${VERSION}" ]]; then
            echo "::error::could not resolve the wasm-bindgen version from bindings/js/Cargo.toml"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wasm-bindgen.outputs.version }}

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Build documentation
        run: just --justfile "$JUSTFILE" build-js-docs

      - name: Check committed JS docs and sitemap are up to date
        shell: bash
        run: |
          set -euo pipefail
          # TypeDoc output and the sitemap that indexes every generated JS page
          # are committed under docs/. Generation is deterministic, so fail if
          # either drifts. --porcelain catches modified, added, and deleted files.
          DRIFT="$(git status --porcelain -- docs/js-api docs/sitemap.xml)"
          if [[ -n "${DRIFT}" ]]; then
            echo "::error::JS docs or sitemap are out of date. Run 'just gen-docs-js' and commit the result."
            echo "${DRIFT}"
            exit 1
          fi
