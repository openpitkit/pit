name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

env:
  JUSTFILE: ${{ github.workspace }}/pipeline.just

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.CI_PYTHON }}

      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "PYTHON_PATH=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "PYO3_PYTHON=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Check Rust
        run: just --justfile "$JUSTFILE" check-rust-full

  python:
    name: Python checks
    runs-on: ubuntu-22.04 # Using as lowest Python version is 3.10 and 22 has it
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: python-${{ matrix.python-version }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "PYTHON_PATH=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "PYO3_PYTHON=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          "$PYTHON_PATH" -m pip install --upgrade pip
          "$PYTHON_PATH" -m pip install -r requirements.txt

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Check Python
        run: just --justfile "$JUSTFILE" check-python-full

  c:
    name: C checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Check C
        run: just --justfile "$JUSTFILE" test-c-examples

  cpp:
    name: C++ checks (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-22.04
            cc: gcc
            cxx: g++
          - name: linux-clang
            os: ubuntu-22.04
            cc: clang
            cxx: clang++
          - name: macos-appleclang
            os: macos-14
            cc: clang
            cxx: clang++
          - name: windows-msvc
            os: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Setup MSVC developer environment
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install C++ tooling (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-tidy doxygen graphviz

      - name: Install C++ tooling (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install llvm doxygen graphviz
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Add LLVM to PATH (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value 'C:\Program Files\LLVM\bin'

      # clang-format ships a per-OS-divergent format from apt/brew, so pin one
      # wheel-packaged build across every runner to keep fmt-check deterministic.
      - name: Install pinned clang-format
        if: ${{ matrix.os != 'windows-2022' }}
        shell: bash
        run: |
          pipx install "clang-format==${CI_CLANG_FORMAT}"
          # Prepend pipx's bin dir so the pinned build shadows any clang-format
          # already baked into the runner image (e.g. /usr/bin/clang-format).
          CF_BIN_DIR="$(pipx environment --value PIPX_BIN_DIR)"
          echo "$CF_BIN_DIR" >> "$GITHUB_PATH"
          "$CF_BIN_DIR/clang-format" --version

      - name: Check C++
        shell: bash
        run: |
          if [[ -n "${{ matrix.cc }}" ]]; then
            export CC="${{ matrix.cc }}"
            export CXX="${{ matrix.cxx }}"
          fi
          just --justfile "$JUSTFILE" check-cpp-full

  go:
    name: Go checks (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
          - name: windows-msvc
            os: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.CI_PYTHON }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.CI_GO }}

      - name: Setup MSVC developer environment
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Add LLVM to PATH (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value 'C:\Program Files\LLVM\bin'

      - name: Install golangci-lint (Unix)
        if: matrix.os != 'windows-2022'
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" "v${CI_GOLANGCI_LINT}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install golangci-lint (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $version = $env:CI_GOLANGCI_LINT
          $archive = "$env:RUNNER_TEMP\golangci-lint.zip"
          $installDir = "$env:RUNNER_TEMP\golangci-lint"
          $url = "https://github.com/golangci/golangci-lint/releases/download/v$version/golangci-lint-$version-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $installDir -Force
          $bin = Get-ChildItem -Path $installDir -Recurse -Filter golangci-lint.exe |
            Select-Object -First 1
          if ($null -eq $bin) {
            throw "golangci-lint.exe not found in $installDir"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $bin.DirectoryName
          & $bin.FullName --version

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Check Go
        shell: bash
        run: just --justfile "$JUSTFILE" check-go-full

  js:
    name: JS checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load CI versions
        shell: bash
        run: cat "$GITHUB_WORKSPACE/.github/ci-versions.env" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.CI_RUST }}
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.CI_NODE }}
          cache: npm
          cache-dependency-path: bindings/js/package-lock.json

      - name: Resolve wasm-bindgen-cli version
        id: wasm-bindgen
        shell: bash
        run: |
          set -euo pipefail
          # Pin the CLI to the exact wasm-bindgen version the crate resolves to
          # (bindings/js/Cargo.toml: wasm-bindgen = "=0.2.x"), so the generated
          # bindings never drift from the runtime crate.
          VERSION="$(
            awk '/^wasm-bindgen[[:space:]]*=/ {
                   match($0, /[0-9]+\.[0-9]+\.[0-9]+/); print substr($0, RSTART, RLENGTH); exit
                 }' bindings/js/Cargo.toml
          )"
          if [[ -z "${VERSION}" ]]; then
            echo "::error::could not resolve the wasm-bindgen version from bindings/js/Cargo.toml"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wasm-bindgen.outputs.version }}

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Check JS
        run: just --justfile "$JUSTFILE" check-js-dry-debug
